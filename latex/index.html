    <style>
        /* This overrides the default latex.css centering */
        body {
            max-width: 100%;
            margin-left: 0;
            padding-left: 2rem; /* Keeps the text from touching the absolute edge */
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 100px;
            margin-top: 2rem;
            margin-bottom: 4rem;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 1.5rem;
        }
        nav a {
            text-decoration: none;
            color: #333;
            letter-spacing: 2px;
        }
        nav a:hover {
            color: #888;
        }
        .center-text {
            text-align: center;
            margin-top: 100px;
        }
    </style>
</head>
